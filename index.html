<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEON MORPHIC</title>

  <!-- CSS Style -->
  <link rel="stylesheet" href="/css/style.css">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

</head>
<body>
  <nav class="navbar">
    <div class="navbar__container">
      <!-- Navbar Logo -->
      <div class="navbar__logo">
        <a href="index.html" class="navbar__logo-link"><span class="navbar__logo-accent">NEON</span>MORPHIC</a>
      </div>
      <!-- Navbar Menu -->
      <ul class="navbar__menu">
        <li class="navbar__item"><a href="/" class="navbar__link">Home</a></li>
        <li class="navbar__item"><a href="/" class="navbar__link">Explore</a></li>
        <li class="navbar__item"><a href="/" class="navbar__link">Create</a></li>
        <li class="navbar__item"><a href="/" class="navbar__link">Contact</a></li>
        <li class="navbar__item"><a href="/" class="navbar__link">Blog</a></li>
      </ul>
      <!-- Navbar Actions -->
      <div class="navbar__actions">
        <a href="/" class="navbar__button">Connect Wallet</a>
      </div>
    </div>
  </nav>

  <!-- Section Hero -->
  <section class="hero">
    <div class="hero__container">
        <div class="hero__content">
        <h1 class="hero__title">Marketplace For <span class="hero__title-accent">Creators</span></h1>
        <p class="hero__description">NFTs Marketplace brings together artists, creators and crypto enthusiasts on a single platform to create and explore top NFTs.</p>

        <div class="hero__actions">
          <a href="/" class="hero__button">Explore</a>
          <a href="/" class="hero__button hero__button--light">Create NFT <i class="bi bi-arrow-right"></i></a>
        </div>
      </div>
      <div class="hero__image">
        <img src="/assets/images/hero-img.png" alt="NFT artwork preview">
      </div>
    </div>
  </section>
</body>
</html>
